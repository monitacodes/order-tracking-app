<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bean Sprout Cafe - Order </title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS for Coffee Theme -->
  <link rel="stylesheet" href="file.css">
</head>
<body>

  <!-- Navbar & Hero Section -->
  <nav class="navbar navbar-dark cafe-navbar shadow-sm mb-2">
    <div class="container text-center d-block py-2">
      <span class="navbar-brand mb-0 h1 fs-2">🌱 Bean Sprout Cafe</span>
      <div class="cafe-tagline">From farm to your cup</div>
    </div>
  </nav>

  <div class="container mb-5 mt-4">
    <div class="row g-4">
      
      <!-- Left Column: Place Order Form -->
      <div class="col-lg-4">
        <div class="card shadow-sm border-0 cafe-card">
          <div class="card-header text-white cafe-card-header text-center py-3">
            <h5 class="mb-0">✨ Freshly Harvested Menu</h5>
          </div>
          <div class="card-body px-4">
            <form id="orderForm">
              <!-- Dynamically populated by JS fetch -->
              <div id="menuItemsContainer">
                <div class="text-center text-muted py-3">Harvesting the menu items...</div>
              </div>
              
              <hr class="my-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="fw-bold text-dark-brown">Your Basket Total:</span>
                <span class="fs-4 fw-bold text-success" id="formTotal">$0.00</span>
              </div>
              <button type="submit" class="btn w-100 btn-cafe py-2" id="placeOrderBtn" disabled>Send Order to Kitchen ☕</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Right Column: Live Orders Grid -->
      <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="text-dark-brown mb-0 fw-bold">Live Counter Tracker</h4>
          <span class="badge bg-cafe-secondary text-dark px-3 py-2 fs-6 rounded-pill" id="activeCounter">0 Active Trackers</span>
        </div>
        
        <!-- Grid for active order cards -->
        <div class="row row-cols-1 row-cols-md-2 g-3" id="ordersGrid">
          <!-- Dynamically appended order cards go here -->
        </div>
        
        
        <div id="emptyState" class="text-center py-5 border rounded cafe-empty-state mt-2">
          <div class="display-1 mb-2">☕</div>
          <p class="text-muted fw-semibold mb-0">Your tracking dashboard is clear.</p>
          <small class="text-muted">Select some farm-fresh items on the left to start brewing!</small>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
 
  <script src="file.js"></script>
</body>
</html>
